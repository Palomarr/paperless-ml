services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: paperless
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      # -h 127.0.0.1 forces a TCP check. Without it, pg_isready talks to
      # the Unix socket, which is open during first-boot init scripts
      # before the TCP listener is bound — dependents see "healthy" and
      # then hit "connection refused" on :5432.
      #
      # -t 1 limits pg_isready to a 1s connection timeout. Postgres's
      # first-boot flow is: initdb → run init scripts → SIGTERM → restart
      # in TCP mode. If our probes (default 3s timeout) hold connections
      # open during SIGTERM, postgres refuses to finish shutdown until
      # clients drain — deadlock. Short probe timeout releases fast.
      #
      # start_period 90s covers the full init dance on slow bare-metal;
      # interval 10s halves probe pressure during that window.
      test: ["CMD-SHELL", "pg_isready -U paperless -d paperless -h 127.0.0.1 -q -t 1"]
      interval: 10s
      timeout: 2s
      retries: 30
      start_period: 90s

  # Observability: Prometheus scrapes ml-gateway + qdrant /metrics endpoints.
  # Config at ops/prometheus/prometheus.yml.
  #
  # Attached to BOTH networks:
  #   - default (our compose's internal bridge)
  #     Lets it scrape ml-gateway, qdrant, redpanda, pipeline-scheduler —
  #     all services declared in this file.
  #   - paperless_ml_net (shared external)
  #     Lets it resolve `drift_monitor:8000` — Elnath's drift monitor
  #     lives in a sibling compose file (paperless_data_integration/
  #     drift_monitor/compose.yml) that attaches only to paperless_ml_net.
  #     Without this, the drift-monitor scrape target comes up DOWN with
  #     "lookup drift_monitor on 127.0.0.11:53: server misbehaving".
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    networks:
      - default
      - paperless_ml_net
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 10

  # Alertmanager: receives firing alerts from Prometheus and forwards to
  # the rollback controller webhook. Architecture reference:
  # architecture.html:968-970.
  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "9093:9093"
    volumes:
      - ./ops/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 10

  # Rollback controller: receives Alertmanager webhooks and executes real
  # rollback when alerts labeled `rollback_trigger: "true"` fire. Moves
  # the `@production` alias on MLflow back one version + restarts
  # ml-gateway via the mounted Docker socket. See ops/rollback-ctrl/app.py
  # for idempotency + security-note docs.
  rollback-ctrl:
    build:
      context: ./ops/rollback-ctrl
    restart: unless-stopped
    expose:
      - "8000"
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      ROLLBACK_MODEL_NAME: htr
      ROLLBACK_ALIAS: production
      ML_GATEWAY_CONTAINER: paperless-ml-ml-gateway-1
      ROLLBACK_COOLDOWN_SECONDS: "300"
    volumes:
      # Needed to restart ml-gateway after alias swap. See security-note
      # in ops/rollback-ctrl/app.py — course-project tradeoff; production
      # would use a ServiceAccount with scoped RBAC instead.
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8000/health',timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 10

  # Grafana dashboards. Datasource + dashboards auto-provisioned from ops/grafana/.
  # Default login: admin / admin. Reachable at http://localhost:3000.
  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12

  # Object storage for page images (HTR crop_s3_url), training data,
  # and model artifacts. S3-compatible API on :9000; web console on :9001.
  # Default credentials: minioadmin / minioadmin.
  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"          # S3 API
      - "9001:9001"          # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  # One-shot: create the two MinIO buckets.
  #   paperless-images    — HTR region crops (anonymous read; matches
  #                         contracts/htr_input.json crop_s3_url pattern)
  #   paperless-datalake  — archival / training-data warehouse. Private.
  #                         Bucket name matches Elnath's paperless_data
  #                         convention so future retraining code that
  #                         reads s3://paperless-datalake/warehouse/... works
  #                         against either MinIO. In production this bucket
  #                         is the analog of CHI@TACC persistent object
  #                         storage (architecture.html:935-936). See
  #                         docs/DEPLOYMENT.md §10 for the warehouse layout.
  minio-init:
    image: minio/mc:RELEASE.2024-10-02T08-27-28Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/paperless-images
        mc anonymous set download local/paperless-images
        mc mb --ignore-existing local/paperless-datalake
        # Placeholder objects make the warehouse/ and mlflow-artifacts/
        # prefixes visible in the MinIO console even before the first
        # real export/run lands.
        echo "paperless-datalake warehouse placeholder" \
          | mc pipe local/paperless-datalake/warehouse/.keep
        echo "paperless-datalake mlflow-artifacts placeholder" \
          | mc pipe local/paperless-datalake/mlflow-artifacts/.keep
        echo "minio-init: paperless-images (public read) + paperless-datalake (private) ready"
    restart: "no"

  # Event streaming for search events, feedback events, HTR corrections.
  # Kafka-protocol-compatible. Access from clients via localhost:9092;
  # from within compose network via redpanda:9092.
  # Auto-creates topics on first produce.
  redpanda:
    image: redpandadata/redpanda:v24.2.4
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=redpanda:8082
      # Match Kafka's default so Pandaproxy produces to new topics don't stall.
      - --set
      - redpanda.auto_create_topics_enabled=true
    ports:
      - "9092:9092"          # Kafka protocol
      - "8082:8082"          # Pandaproxy REST (HTTP produce/consume)
      - "9644:9644"          # Admin API + /metrics endpoint
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --exit-when-healthy --watch=false"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  # One-shot: create the four known topics. Safe to re-run — rpk topic create
  # returns non-zero on existing topics but we swallow errors, and auto-create
  # is also enabled above so missed topics self-heal on first produce.
  redpanda-init:
    image: redpandadata/redpanda:v24.2.4
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set +e
        for t in paperless.uploads paperless.corrections paperless.queries paperless.feedback; do
          rpk topic create --brokers redpanda:9092 "$$t" --partitions 1 --replicas 1 2>&1 \
            | grep -v "already exists" || true
        done
        echo "redpanda-init: topics ready"
    restart: "no"

  # Vector store for semantic search. Collection created by qdrant-init.
  qdrant:
    image: qdrant/qdrant:v1.11.3
    restart: unless-stopped
    ports:
      - "6333:6333"          # REST API (dashboard at http://localhost:6333/dashboard)
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 20

  # One-shot: create the `document_chunks` collection idempotently.
  # Runs to completion, then exits. Safe to re-run.
  qdrant-init:
    image: curlimages/curl:8.9.1
    depends_on:
      qdrant:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        if curl -sf http://qdrant:6333/collections/document_chunks > /dev/null; then
          echo "qdrant-init: collection document_chunks already exists";
        else
          echo "qdrant-init: creating document_chunks (768-dim, cosine)";
          curl -sf -X PUT http://qdrant:6333/collections/document_chunks \
            -H 'Content-Type: application/json' \
            -d '{"vectors":{"size":768,"distance":"Cosine"}}';
          echo "qdrant-init: created";
        fi
    restart: "no"

  # Real ML serving container. Built from serving/ with GPU PyTorch wheels
  # — the deployed path per our initial-implementation proposal. Initial-impl
  # benchmark CSV (serving/benchmarks/serving_options.csv) shows 1.8× HTR
  # speedup on the Chameleon P100 (260ms p50 CPU → 147ms p50 GPU).
  #
  # CPU variant (`Dockerfile.fastapi-cpu`) is preserved as a sibling for
  # WSL/laptop dev where no GPU is available — swap the `dockerfile:` line
  # below to use it. The same `app.py` is baked into both images, so the API
  # surface (routes, metrics, response shapes) is identical regardless of
  # which variant runs.
  #
  # First build takes ~5–10 min (CUDA runtime + GPU torch + model download).
  # Requires nvidia-container-toolkit on the host (Chameleon CHI@TACC P100
  # image ships with it pre-installed).
  ml-gateway:
    build:
      context: ./serving
      dockerfile: dockerfiles/Dockerfile.fastapi-ort
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8090:8000"          # host 8090 -> container 8000 (curl from laptop; 8080 taken by Bilibili proxy on Windows)
    environment:
      USE_MOCK_CHUNKS: "false"   # real Qdrant search; vectors populated by ml_hooks.encode_document
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      HTR_MODEL_VERSION: htr_v1
      RETRIEVAL_MODEL_VERSION: retrieval_v1
      # /htr fetches region crops from MinIO via crop_s3_url (Elnath's pipeline).
      # Must match our MinIO defaults; the image ships with admin/paperless_minio
      # defaults that predate our rename.
      #
      # Note: peer-repo containers (Elnath's trainer, his Airflow tasks) also
      # ship with admin/paperless_minio defaults. When they run against our
      # stack, their compose / Airflow task-level env overrides must set these
      # same minioadmin/minioadmin values — this is pure coordination, no code
      # change needed on either side.
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      # Warehouse bucket for archival / training data. Analog of CHI@TACC
      # persistent object store; see docs/DEPLOYMENT.md §10.
      WAREHOUSE_BUCKET: paperless-datalake
      WAREHOUSE_PREFIX: warehouse
      # Fine-tuned-model URIs. When the ONNX-Runtime serving variant
      # (app_ort.py, pulled in via Dockerfile.fastapi-ort) is the active
      # dockerfile, ml-gateway downloads the artifacts at the URIs below
      # during boot — OVERWRITING the image-baked stock HuggingFace weights.
      #
      # Path is a stable fixed "production" prefix whose *contents* get
      # swapped out by pipeline-scheduler on promote (server-side mc cp,
      # see ops/pipeline-scheduler/scheduler.py:_sync_to_production_prefix).
      # This keeps HTR_MODEL_URI as a static compose env — only a
      # container restart is needed to pick up new weights, not a recreate.
      #
      # When Elnath's Airflow trainer is not yet deployed (or the prefix is
      # empty on a fresh node), app_ort.py's download_prefix_from_s3 raises
      # and ml-gateway fails to boot — which is correct behavior: better to
      # fail loudly than to silently serve an undetermined model.
      #
      # app.py (current PyTorch-CPU variant) ignores these env vars; they're
      # only consumed by app_ort.py.
      HTR_MODEL_URI: "s3://paperless-datalake/warehouse/models/htr/production/"
      EMBEDDING_MODEL_URI: ""
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8000/health',timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 300s     # first boot: HF model download + ONNX export + load — 5min cap covers slow disks

  # One-shot: create the 'mlflow' database inside our shared postgres.
  # Postgres only runs /docker-entrypoint-initdb.d/*.sql on first boot,
  # so on an existing volume that was initialized by Paperless, that path
  # doesn't run. We use a psql-based idempotent init instead.
  mlflow-db-init:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: paperless
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        # Defense-in-depth: even with the postgres healthcheck gating us
        # on TCP readiness, retry briefly in case the TCP listener flaps
        # during first-boot restart. pg_isready here uses -h postgres so
        # it tests the exact connection string we're about to use.
        for i in $$(seq 1 15); do
          if pg_isready -h postgres -U paperless -d paperless -q; then
            break
          fi
          echo "mlflow-db-init: postgres not yet accepting TCP, retry $$i/15"
          sleep 2
        done
        if psql -h postgres -U paperless -lqt | cut -d \| -f 1 | grep -qw mlflow; then
          echo "mlflow-db-init: database 'mlflow' already exists"
        else
          psql -h postgres -U paperless -d paperless -c "CREATE DATABASE mlflow"
          echo "mlflow-db-init: created 'mlflow' database"
        fi
    restart: "no"

  # MLflow tracking server (architecture.html tier 5, lines 995-998).
  #   Backend store   : mlflow DB in our shared postgres (see mlflow-db-init)
  #   Artifact store  : s3://paperless-datalake/mlflow-artifacts/ on our MinIO
  #   Tracking URI    : http://mlflow:5000    (inside compose network)
  #                     http://<floating-ip>:5050   (from host/browser)
  # Training containers (dev/training branch) set MLFLOW_TRACKING_URI to
  # http://mlflow:5000 and log params/metrics/artifacts here. Quality gates
  # in eval.py then call mlflow.register_model() on the gated runs.
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.9.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      mlflow-db-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    ports:
      - "5050:5000"         # host 5050 -> container 5000 (MLflow default)
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      # Permit access via any Host header (needed when reached via floating IP)
      MLFLOW_SERVER_ALLOWED_HOSTS: "*"
    # gunicorn --timeout 600 (default 30s) keeps workers alive while
    # serve-artifacts buffers + re-uploads large transformers shards
    # (~331MB each for VisionEncoderDecoderModel) to MinIO; without it
    # workers get killed mid-upload and the trainer hangs on shard 2/N.
    command: >
      /bin/sh -c "pip install --quiet psycopg2-binary boto3 &&
      mlflow server
      --backend-store-uri postgresql://paperless:paperless@postgres/mlflow
      --artifacts-destination s3://paperless-datalake/mlflow-artifacts/
      --serve-artifacts
      --gunicorn-opts '--timeout 600'
      --host 0.0.0.0
      --port 5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:5000/health',timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Pipeline scheduler: closes the retrain → evaluate → gate → promote
  # loop with minimal human intervention. Polls the Feedback table +
  # time-since-last-run; when BOTH thresholds are met, spawns training
  # containers for train.py / eval.py / quality_gate.py sequentially and
  # promotes the new version on gate pass (moves @production alias +
  # restarts ml-gateway). Symmetric with rollback-ctrl (which swaps the
  # alias the other way on alert firing). See ops/pipeline-scheduler/
  # scheduler.py for trigger-rule justification.
  pipeline-scheduler:
    build:
      context: ./ops/pipeline-scheduler
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_NAME: htr
      PRODUCTION_ALIAS: production
      TRAINING_IMAGE: paperless-training
      PAPERLESS_NET: paperless_ml_net
      ML_GATEWAY_CONTAINER: paperless-ml-ml-gateway-1
      POSTGRES_HOST: postgres
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: paperless
      # Production defaults — see scheduler.py docstring for the
      # "500 corrections × 24h" justification. Override with
      # `docker compose run -e MIN_CORRECTIONS_DELTA=0 ...` for demo.
      POLL_INTERVAL_SECONDS: "600"
      MIN_CORRECTIONS_DELTA: "500"
      MIN_HOURS_SINCE_LAST_RUN: "24"
      # MinIO creds for production-prefix sync on promote. See
      # scheduler.py:_sync_to_production_prefix — after a gate-passing
      # retraining run, MLflow artifacts are server-side-copied to the
      # fixed production prefix so ml-gateway's HTR_MODEL_URI (a static
      # compose env) picks up the new weights on the next restart.
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      PRODUCTION_BUCKET: paperless-datalake
      PRODUCTION_PREFIX: warehouse/models/htr/production
    volumes:
      # See rollback-ctrl for the security-note rationale — same tradeoff.
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8000/metrics',timeout=2)"]
      interval: 15s
      timeout: 3s
      retries: 10

  # Fallback stub for fast iteration without building the real serving image.
  # Opt-in: `docker compose --profile stub up -d fastapi-stub paperless-web ...`
  # When using the stub, also override ML_GATEWAY_URL to point at it.
  fastapi-stub:
    image: python:3.12-slim
    profiles: ["stub"]
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./scripts/fastapi_stub.py:/app/fastapi_stub.py:ro
    command: >
      sh -c "pip install --quiet fastapi 'uvicorn[standard]' &&
             uvicorn fastapi_stub:app --host 0.0.0.0 --port 8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8080/healthz',timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Paperless-ngx fork (Elnath, REDES01/paperless-ngx@dev) with the
  # paperless_ml Django app + Angular sidebar tabs (HTR Review +
  # Semantic Search) baked in. Our ml_counters overlay rides alongside as
  # a Django middleware that fires ml-gateway counter increments after
  # successful POSTs to /api/ml/htr/corrections/ and /api/ml/search/feedback/
  # — that's the seam that keeps HtrCorrectionRateHigh + SearchCTRLow
  # alerts firing despite feedback now landing in the data-stack postgres
  # (not Paperless's own DB) via paperless_ml.views.
  paperless-web:
    image: ghcr.io/redes01/paperless-ngx-ml:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ml-gateway:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      # Load both ml_hooks (encode_document → Qdrant, /api/search/ merge,
      # /ml-ui/, Redpanda event emission, FAB middleware) AND ml_counters
      # (counter forwarder for paperless_ml POSTs) alongside the baked-in
      # paperless_ml. Both URL namespaces coexist:
      #   ml_hooks      → /api/ml/feedback/, /ml-ui/*
      #   paperless_ml  → /api/ml/htr/*, /api/ml/search/feedback/  (his fork)
      #   ml_counters   → middleware-only, no URLs
      # All three signal handlers fire on Document save — duplicate publish
      # to paperless.uploads is acceptable (consumers dedup by paperless_doc_id)
      # and Qdrant upserts are idempotent (UUID5 keys).
      PAPERLESS_APPS: "ml_hooks,ml_counters"
      PYTHONPATH: "/usr/src/paperless/patches:/usr/src/paperless/src"

      # Paperless's own datastores (unchanged).
      PAPERLESS_REDIS: "redis://redis:6379"
      PAPERLESS_DBENGINE: postgresql
      PAPERLESS_DBHOST: postgres
      PAPERLESS_DBNAME: paperless
      PAPERLESS_DBUSER: paperless
      PAPERLESS_DBPASS: paperless
      PAPERLESS_SECRET_KEY: "dev-only-insecure-key-do-not-ship"
      PAPERLESS_TIME_ZONE: America/New_York
      PAPERLESS_OCR_LANGUAGE: eng
      PAPERLESS_ADMIN_USER: admin
      PAPERLESS_ADMIN_PASSWORD: admin
      PAPERLESS_URL: "http://localhost:8000"
      REDPANDA_PROXY_URL: "http://redpanda:8082"
      WAREHOUSE_BUCKET: paperless-datalake
      WAREHOUSE_PREFIX: warehouse

      # Elnath's paperless_ml app reads/writes the data-stack postgres
      # (htr_corrections, search_feedback, query_sessions schemas). The
      # `postgres` hostname resolves on the paperless_data_default network
      # we attach below. Falls back to our local postgres if that network
      # isn't up — paperless_ml's views return 503 cleanly in that case.
      PAPERLESS_ML_DBHOST: postgres
      PAPERLESS_ML_DBPORT: "5432"
      PAPERLESS_ML_DBNAME: paperless
      PAPERLESS_ML_DBUSER: user
      PAPERLESS_ML_DBPASSWORD: paperless_postgres

      # Where his Angular components proxy /ml-api/<path> → our ml-gateway.
      # Our app_ort.py keeps legacy /predict/htr + /predict/search aliases
      # so this works without a route rewrite on his side (commit c055e87).
      PAPERLESS_ML_SERVING_URL: "http://ml-gateway:8000"

      # His producer.py publishes uploads to our shared Redpanda.
      PAPERLESS_ML_KAFKA_BROKER: "redpanda:9092"
      PAPERLESS_ML_KAFKA_TOPIC: "paperless.uploads"

      # His signal handlers clean up Qdrant on document delete.
      PAPERLESS_ML_QDRANT_HOST: "qdrant"
      PAPERLESS_ML_QDRANT_PORT: "6333"
      PAPERLESS_ML_QDRANT_COLLECTION: "document_chunks"

      # Our middleware (ml_counters.middleware.CounterForwarderMiddleware)
      # forwards successful POSTs to ml-gateway counter endpoints.
      ML_COUNTERS_GATEWAY_URL: "http://ml-gateway:8000"
    volumes:
      - ./paperless_patches:/usr/src/paperless/patches
      - paperless_data:/usr/src/paperless/data
      - paperless_media:/usr/src/paperless/media
      - paperless_consume:/usr/src/paperless/consume
      - paperless_export:/usr/src/paperless/export
    networks:
      # paperless_ml_net carries everything: ml-gateway, qdrant, redpanda,
      # and the data-stack-postgres that paperless_ml's views write to.
      # (data-stack-postgres is now defined in docker-compose.peer.yml on
      # this same network, so no separate paperless_data_default attach.)
      - default
      - paperless_ml_net

volumes:
  pg_data:
  qdrant_data:
  minio_data:
  redpanda_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  paperless_data:
  paperless_media:
  paperless_consume:
  paperless_export:

# Shared bridge network for cross-stack attach (Path A). Declared here so
# `docker compose up -d` creates it on first boot — no external `docker
# network create` step required. Elnath's stacks in REDES01/paperless_data
# and paperless_data_integration attach via `external: true` referencing
# this same name.
networks:
  paperless_ml_net:
    name: paperless_ml_net
    driver: bridge
