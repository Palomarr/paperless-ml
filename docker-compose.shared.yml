# Overlay that attaches services to the shared paperless_ml_net bridge
# network, enabling cross-stack integration with REDES01/paperless_data_integration
# (the data role's htr_consumer and related workers).
#
# Standalone dev mode (our stack only):
#   docker compose up -d
#
# Integrated mode (with data-role's consumers):
#   docker compose -f docker-compose.yml -f docker-compose.shared.yml up -d
#
# The paperless_ml_net network itself is declared in docker-compose.yml and
# compose creates it on first boot — no external `docker network create`
# needed. Elnath's compose projects attach as `external: true`.
#
# Services attached to the shared net are the ones external consumers need.
# postgres (Paperless's own DB) and qdrant stay internal to avoid DNS
# ambiguity with the data role's identically-named postgres/qdrant in
# REDES01/paperless_data, which runs as an independent project for their
# own tables and rubric deliverables.
#
# DNS aliases keep the data role's hardcoded hostnames working:
#   - paperless-web  → also answers to paperless-webserver-1, webserver
#   - ml-gateway     → also answers to fastapi_server

services:
  paperless-web:
    networks:
      default:
      paperless_ml_net:
        aliases:
          - paperless-webserver-1
          - webserver

  ml-gateway:
    networks:
      default:
      paperless_ml_net:
        aliases:
          - fastapi_server

  # MLflow on the shared net so external training containers + Elnath's
  # drift_monitor can reach it via hostname `mlflow:5000` without going
  # through the host's floating IP.
  mlflow:
    networks:
      default:
      paperless_ml_net:

  minio:
    networks:
      default:
      paperless_ml_net:

  redpanda:
    networks:
      default:
      paperless_ml_net:
