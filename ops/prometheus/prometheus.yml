# Prometheus scrape config for the paperless-ngx ML stack.
# Services live on the compose default bridge network and are reachable
# by their compose service name.
global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: fastapi
    metrics_path: /metrics
    static_configs:
      - targets: ["fastapi:8000"]
        labels:
          service: ml-gateway

  - job_name: qdrant
    metrics_path: /metrics
    static_configs:
      - targets: ["qdrant:6333"]
        labels:
          service: qdrant
