services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - paperless-net

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/paperless-images &&
      mc anonymous set download local/paperless-images
      "
    networks:
      - paperless-net

  fastapi_server:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.fastapi-ort
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=none
      - ONNX_DIR=/models
      - USE_MOCK_CHUNKS=true
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=paperless_minio
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    volumes:
      - ./onnx_models_quantized:/models:ro
    deploy:
      resources:
    networks:
      - paperless-net

