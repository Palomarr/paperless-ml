services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/paperless-images &&
      mc anonymous set download local/paperless-images
      "

  fastapi_server:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.fastapi
      args:
        # Chameleon P100
        BASE_IMAGE: nvidia/cuda:11.8.0-runtime-ubuntu22.04
        TORCH_INDEX: https://download.pytorch.org/whl/cu118
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - TORCH_CUDA_ARCH_LIST=6.0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=paperless_minio
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - paperless-net

  dev:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.dev
    volumes:
      - .:/workspace
    working_dir: /workspace
    network_mode: host
    profiles: ["dev"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  minio_data:

networks:
  paperless-net:
    external: true
